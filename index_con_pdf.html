<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Informe Comercial BBVA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --az:#004A97;--az2:#003070;--azcl:#E8F0FB;--tq:#00A3A6;
  --bo:#D8DDE6;--tx:#1A1A2E;--gr:#6B7280;--grcl:#F9FAFB;
  --err:#DC2626;--ok:#16A34A;
}
html{height:100%}
body{
  font-family:"IBM Plex Sans",sans-serif;
  background:#fff;
  color:var(--tx);
  min-height:100%;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.hdr{
  background:var(--az);
  padding:14px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
}

.hdr-txt{color:rgba(255,255,255,.85);font-size:12px}
.hdr-txt strong{display:block;font-size:14px;font-weight:600;color:#fff}

/* PROGRESS BAR */
.prog-wrap{background:var(--az);padding:0 20px 12px;flex-shrink:0}
.prog-track{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--tq);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-label{
  display:flex;justify-content:space-between;
  margin-top:6px;font-size:10px;color:rgba(255,255,255,.65)
}

/* MAIN SLIDE AREA */
.slides-container{
  flex:1;
  min-height:300px;
  overflow:hidden;
  position:relative;
  -webkit-overflow-scrolling:touch;
}
.slide{
  display:none;
  flex-direction:column;
  padding:28px 24px 24px;
  overflow-y:auto;
  min-height:300px;
  animation:fadeIn .25s ease;
}
.slide.active{display:flex}
.slide.prev{display:none}
.slide.next{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* QUESTION */
.q-num{
  font-size:11px;font-weight:600;color:var(--tq);
  letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:6px;
}
.q-title{
  font-size:22px;font-weight:600;color:var(--tx);
  line-height:1.3;margin-bottom:6px;
}
.q-sub{font-size:13px;color:var(--gr);margin-bottom:24px;line-height:1.5}

/* INPUTS */
.inp{
  width:100%;padding:14px 16px;
  border:2px solid var(--bo);border-radius:12px;
  font-size:16px;font-family:inherit;color:var(--tx);
  background:#fff;outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.inp:focus{border-color:var(--az);box-shadow:0 0 0 4px rgba(0,74,151,.1)}
.inp.err{border-color:var(--err)}
.inp+.inp{margin-top:10px}
.err-msg{font-size:12px;color:var(--err);margin-top:6px;display:none}
.err-msg.show{display:block}

/* CHOICE BUTTONS */
.choices{display:flex;flex-direction:column;gap:10px}
.choice{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border:2px solid var(--bo);
  border-radius:12px;cursor:pointer;
  font-size:15px;font-weight:500;color:var(--tx);
  background:#fff;transition:all .15s;
  text-align:left;font-family:inherit;
  width:100%;
}
.choice:hover{border-color:var(--az);background:var(--azcl)}
.choice.sel{border-color:var(--az);background:var(--azcl);color:var(--az)}
.choice-icon{
  width:36px;height:36px;border-radius:50%;
  background:var(--grcl);border:1.5px solid var(--bo);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all .15s;
}
.choice.sel .choice-icon{background:var(--az);border-color:var(--az);color:#fff}

/* TOGGLE SWITCH */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border:2px solid var(--bo);border-radius:12px;
  margin-bottom:10px;
}
.toggle-label{font-size:14px;font-weight:500;color:var(--tx)}
.toggle-sub{font-size:12px;color:var(--gr);margin-top:2px}
.sw{position:relative;width:48px;height:26px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-track{
  position:absolute;inset:0;background:var(--bo);
  border-radius:13px;cursor:pointer;transition:background .2s;
}
.sw-track:before{
  content:'';position:absolute;
  width:20px;height:20px;left:3px;top:3px;
  background:#fff;border-radius:50%;
  transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.sw input:checked+.sw-track{background:var(--az)}
.sw input:checked+.sw-track:before{transform:translateX(22px)}

/* ACCIONISTA CARDS */
.ac-card{
  border:1.5px solid var(--bo);border-radius:12px;
  padding:14px;margin-bottom:10px;background:var(--grcl);
  position:relative;
}
.ac-card-title{font-size:12px;font-weight:600;color:var(--az);margin-bottom:10px}
.ac-del{
  position:absolute;top:10px;right:10px;
  width:26px;height:26px;border-radius:50%;border:none;
  background:#FEE2E2;color:var(--err);font-size:14px;
  cursor:pointer;font-weight:700;display:flex;
  align-items:center;justify-content:center;
}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:380px){.g2{grid-template-columns:1fr}}
.f{margin-bottom:8px}
.f label{display:block;font-size:11px;font-weight:500;color:var(--gr);margin-bottom:4px}
.f .inp{padding:10px 12px;font-size:14px;border-radius:8px}
.badd{
  display:flex;align-items:center;justify-content:center;
  gap:6px;width:100%;padding:12px;
  border:2px dashed var(--az);border-radius:12px;
  background:var(--azcl);color:var(--az);
  font-size:13px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
.badd:hover{background:#d0e4f7}

/* FOOTER BUTTONS */
.footer{
  flex-shrink:0;padding:16px 24px;
  background:#fff;
  border-top:1px solid var(--bo);
  display:flex;gap:10px;
}
.btn-back{
  padding:14px 20px;border-radius:12px;
  border:2px solid var(--bo);background:#fff;
  color:var(--gr);font-size:15px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.btn-back:hover{border-color:var(--az);color:var(--az)}
.btn-next{
  flex:1;padding:14px;border-radius:12px;border:none;
  background:var(--az);color:#fff;
  font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-next:hover{background:var(--az2)}
.btn-next:disabled{background:#9CA3AF;cursor:not-allowed}
.btn-gen{background:var(--tq)}
.btn-gen:hover{background:#0F7A7C}

/* LOADING OVERLAY */
#ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:999;
  align-items:center;justify-content:center;
}
#ov.on{display:flex}
.ov-box{
  background:#fff;border-radius:16px;
  padding:32px 40px;text-align:center;min-width:260px;
}
.spr{
  width:48px;height:48px;
  border:4px solid var(--azcl);border-top-color:var(--az);
  border-radius:50%;animation:sp .8s linear infinite;
  margin:0 auto 16px;
}
@keyframes sp{to{transform:rotate(360deg)}}
.ov-title{font-size:17px;font-weight:600;color:var(--az);margin-bottom:12px}
.ov-sub{font-size:12px;color:var(--gr)}
.ov-dots{display:flex;justify-content:center;gap:8px;margin-top:4px}
.ov-dots span{
  width:9px;height:9px;border-radius:50%;background:var(--az);
  animation:dotBounce 1.2s ease-in-out infinite;
}
.ov-dots span:nth-child(2){animation-delay:.2s}
.ov-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{
  0%,80%,100%{transform:scale(.5);opacity:.4}
  40%{transform:scale(1);opacity:1}
}

/* SUMMARY */
.summary-list{list-style:none}
.summary-list li{
  display:flex;justify-content:space-between;align-items:start;
  padding:10px 0;border-bottom:1px solid var(--bo);
  font-size:14px;gap:16px;
}
.summary-list li:last-child{border-bottom:none}
.sum-key{color:var(--gr);font-size:12px;flex-shrink:0}
.sum-val{font-weight:500;text-align:right}
</style>
</head>

//  HELPERS
// ============================================================
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function gv(id){ var e=document.getElementById(id); return e?(e.value||'').trim():''; }
function cls(id,c,add){ var e=document.getElementById(id); if(e){if(add)e.classList.add(c); else e.classList.remove(c);} }
function show(id,show){ var e=document.getElementById(id); if(e)e.classList.toggle('show',show); }

function mkChoice(label, icon, selected){
  return '<button class="choice'+(selected===label?' sel':'')+'" onclick="selChoice(this,\''+label+'\')">'
    +'<div class="choice-icon">'+icon+'</div>'+label+'</button>';
}
function selChoice(el, val){
  el.closest('.choices').querySelectorAll('.choice').forEach(function(b){b.classList.remove('sel');});
  el.classList.add('sel');
  // Determine which field
  var slide = SLIDES[cur];
  if(slide.id==='c_cargo'){
    D.cc = val;
    var otro = document.getElementById('v_cc_otro');
    if(otro) otro.style.display = (val==='Otro'?'block':'none');
  } else if(slide.id==='predios'){
    if(val==='Sí, agregar predios'){ D.predios.push(emptyPr()); renderSlide(cur); }
    else { D.predios=[]; }
  } else if(slide.id==='clientes'){
    if(val==='Sí, agregar clientes'){ D.clientes.push(emptyCli()); renderSlide(cur); }
    else { D.clientes=[]; }
  } else if(slide.id==='proveedores'){
    if(val==='Sí, agregar proveedores'){ D.proveedores.push(emptyProv()); renderSlide(cur); }
    else { D.proveedores=[]; }
  }
}
function isOtroCargo(){
  var presets=['Gerente General','Gerente de Finanzas','Contador','Apoderado'];
  return D.cc && presets.indexOf(D.cc)===-1;
}

// ============================================================
//  NAVIGATION
// ============================================================
function renderSlide(idx){
  var sc = document.getElementById('sc');
  sc.innerHTML = '<div class="slide active">'+SLIDES[idx].render()+'</div>';
  // Progress
  var pct = Math.round((idx/(TOTAL-1))*100);
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('p-step').textContent = 'Paso '+(cur+1)+' de '+TOTAL;
  document.getElementById('p-pct').textContent = pct+'%';
  // Buttons
  document.getElementById('btn-back').style.display = idx===0?'none':'flex';
  var btnNext = document.getElementById('btn-next');
  if(idx === TOTAL-1){
    btnNext.textContent = '⬇ Descargar Excel';
    btnNext.className = 'btn-next btn-gen';
    btnNext.onclick = generar;
    var btnPdf = document.getElementById('btn-pdf');
    if(btnPdf) btnPdf.style.display='flex';
  } else {
    btnNext.textContent = 'Continuar →';
    btnNext.className = 'btn-next';
    btnNext.onclick = next;
    var btnPdf = document.getElementById('btn-pdf');
    if(btnPdf) btnPdf.style.display='none';
  }
  // Auto-focus solo en slides simples (no en cards con múltiples inputs)
  var slideId = SLIDES[idx].id;
  var noAutoFocus = ['accionistas','predios','clientes','proveedores'];
  if(noAutoFocus.indexOf(slideId) === -1){
    setTimeout(function(){
      var inp = sc.querySelector('input:not([type=checkbox]):not([type=number])');
      if(inp && window.innerWidth > 600) inp.focus();
    }, 400);
  }
}

function next(){
  SLIDES[cur].save();
  if(!SLIDES[cur].validate()) return;
  // BRANCHING: si es Titular, set rs = cn y limpiar accionistas
  if(SLIDES[cur].id==='c_cargo'){
    if(D.cc==='Titular'){
      D.rs = D.cn;
      D.accionistas = [];
    }
  }
  if(cur < TOTAL-1){
    cur++;
    var skipList = (D.cc==='Titular') ? ['rs','accionistas'] : [];
    while(cur < TOTAL-1 && skipList.indexOf(SLIDES[cur].id) !== -1) cur++;
    renderSlide(cur);
  }
}

function back(){
  if(cur > 0){
    cur--;
    var skipList = (D.cc==='Titular') ? ['rs','accionistas'] : [];
    while(cur > 0 && skipList.indexOf(SLIDES[cur].id) !== -1) cur--;
    renderSlide(cur);
  }
}

//  GENERATE
// ============================================================
function loadScript(src){
  return new Promise(function(res,rej){
    if(document.querySelector('script[src="'+src+'"]')){res();return;}
    var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

async function generar(){
  SLIDES[cur].save();
  document.getElementById('ov').classList.add('on');
  document.getElementById('ov-title').textContent='Por favor espere unos segundos';
  try{
    if(!window._pyReady){
      var mod=await import("https://cdn.jsdelivr.net/pyodide/v0.27.3/full/pyodide.mjs");
      window._py=await mod.loadPyodide();
      document.getElementById('ov-title').textContent='Por favor espere unos segundos';
      await window._py.loadPackage('micropip');
      var mp=window._py.pyimport('micropip');
      await mp.install('openpyxl');
      var code=new TextDecoder().decode(Uint8Array.from(atob(FILLER_B64),function(c){return c.charCodeAt(0);}));
      await window._py.runPythonAsync(code);
      window._pyReady=true;
    }
    document.getElementById('ov-title').textContent='Por favor espere unos segundos';

    D.fruc = D.ruc;
    var data={
      cn:D.cn,cc:D.cc,ce:D.ce,ct:D.ct,
      rs:D.rs,dom:D.dom,ruc:D.ruc,
      fruc:D.ruc,flug:D.flug,ffec:D.ffec,
      ac:JSON.stringify(D.accionistas),
      pr:JSON.stringify(D.predios),
      cl:JSON.stringify(D.clientes),
      pv:JSON.stringify(D.proveedores)
    };
    window._py.globals.set('_xls', XLS_B64);
    window._py.globals.set('_data', JSON.stringify(data));
    var res=await window._py.runPythonAsync('fill_excel(_xls,_data)');
    var bytes=Uint8Array.from(atob(res),function(c){return c.charCodeAt(0);});
    var blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='InformeComercial_BBVA_'+(D.rs||D.ruc||'cliente').replace(/\s+/g,'_').substring(0,30)+'.xlsx';
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    document.getElementById('ov').classList.remove('on');
  }catch(err){
    document.getElementById('ov').classList.remove('on');
    console.error(err);
    alert('Error: '+err.message);
  }
}

var RENDER_URL = 'https://informe-comercial-2bro.onrender.com';  // ← CAMBIA ESTO

async function generarPDF(){
  SLIDES[cur].save();
  document.getElementById('ov').classList.add('on');
  document.getElementById('ov-title').textContent='Generando PDF, por favor espere...';
  try{
    // 1) Primero genera el Excel igual que generar()
    if(!window._pyReady){
      var mod=await import("https://cdn.jsdelivr.net/pyodide/v0.27.3/full/pyodide.mjs");
      window._py=await mod.loadPyodide();
      document.getElementById('ov-title').textContent='Generando PDF, por favor espere...';
      await window._py.loadPackage('micropip');
      var mp=window._py.pyimport('micropip');
      await mp.install('openpyxl');
      var code=new TextDecoder().decode(Uint8Array.from(atob(FILLER_B64),function(c){return c.charCodeAt(0);}));
      await window._py.runPythonAsync(code);
      window._pyReady=true;
    }
    D.fruc = D.ruc;
    var data={
      cn:D.cn,cc:D.cc,ce:D.ce,ct:D.ct,
      rs:D.rs,dom:D.dom,ruc:D.ruc,
      fruc:D.ruc,flug:D.flug,ffec:D.ffec,
      ac:JSON.stringify(D.accionistas),
      pr:JSON.stringify(D.predios),
      cl:JSON.stringify(D.clientes),
      pv:JSON.stringify(D.proveedores)
    };
    window._py.globals.set('_xls', XLS_B64);
    window._py.globals.set('_data', JSON.stringify(data));
    var xlsxB64=await window._py.runPythonAsync('fill_excel(_xls,_data)');

    // 2) Envía al servidor Render y recibe el PDF
    document.getElementById('ov-title').textContent='Convirtiendo a PDF...';
    var resp = await fetch(RENDER_URL+'/convert',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({xlsx_b64: xlsxB64})
    });
    if(!resp.ok){
      var err=await resp.json().catch(()=>({}));
      throw new Error(err.error||('Error HTTP '+resp.status));
    }
    var result=await resp.json();

    // 3) Descarga el PDF
    var pdfBytes=Uint8Array.from(atob(result.pdf_b64),function(c){return c.charCodeAt(0);});
    var blob=new Blob([pdfBytes],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='InformeComercial_BBVA_'+(D.rs||D.ruc||'cliente').replace(/\s+/g,'_').substring(0,30)+'.pdf';
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    document.getElementById('ov').classList.remove('on');
  }catch(err){
    document.getElementById('ov').classList.remove('on');
    console.error(err);
    alert('Error al generar PDF:\n'+err.message+'\n\nAsegúrate de haber configurado la URL de Render en el código.');
  }
}

function setAcDir(i, val){
  D.accionistas[i].dir = val;
  var si = document.getElementById('acdir_si_'+i);
  var no = document.getElementById('acdir_no_'+i);
  if(!si||!no) return;
  si.style.border = '1.5px solid '+(val==='Si'?'var(--az)':'var(--bo)');
  si.style.background = val==='Si'?'var(--azcl)':'#fff';
  si.style.color = val==='Si'?'var(--az)':'var(--gr)';
  no.style.border = '1.5px solid '+(val==='No'?'var(--err)':'var(--bo)');
  no.style.background = val==='No'?'#FEE2E2':'#fff';
  no.style.color = val==='No'?'var(--err)':'var(--gr)';
  autoSave();
}

// ============================================================
//  AUTOGUARDADO (localStorage)
// ============================================================
var _saveTimer = null;
function autoSave(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    try{ localStorage.setItem('bbva_ic_draft', JSON.stringify({D:D,cur:cur})); }catch(e){}
  }, 400);
}
function loadDraft(){
  try{
    var raw = localStorage.getItem('bbva_ic_draft');
    if(!raw) return false;
    var saved = JSON.parse(raw);
    if(saved && saved.D){
      // mezclar campos clave por si el modelo de datos cambió
      var keys = ['cn','cc','ce','ct','rs','dom','ruc','accionistas','predios','clientes','proveedores','fruc','flug','ffec'];
      keys.forEach(function(k){ if(saved.D[k] !== undefined) D[k] = saved.D[k]; });
      if(typeof saved.cur === 'number') cur = saved.cur;
      return true;
    }
  }catch(e){}
  return false;
}

// INIT
// Escuchar cualquier input en el documento para autoguardar
document.addEventListener('input', function(){ autoSave(); });
document.addEventListener('change', function(){ autoSave(); });

// Cargar borrador guardado o empezar desde 0
if(loadDraft()){
  renderSlide(cur);
} else {
  renderSlide(0);
}
</script>
